name: Build and Push API Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile*'
      - '.github/workflows/build-api.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Step 1: Checkout ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Go (native x86_64) ─────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: false

      - name: Verify Go version
        run: |
          echo "=== Go Version ==="
          go version
          echo ""
          echo "=== Go Env ==="
          go env GOOS GOARCH GOTOOLCHAIN

      # ── Step 3: Download dependencies ──────────────────
      - name: Download Go modules
        run: |
          echo "=== Downloading modules ==="
          go mod download
          echo "=== Module cache ==="
          go env GOMODCACHE

      # ── Step 4: Cross-compile ARM64 binary natively ────
      - name: Build ARM64 binary
        run: |
          echo "=== Building linux/arm64 binary ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-w -s" \
            -o api \
            ./cmd/api
          
          echo ""
          echo "=== Binary verification ==="
          file api
          ls -lh api
          
          echo ""
          echo "=== Binary checksum ==="
          sha256sum api

      # ── Step 5: Setup Docker Buildx ──────────────────
      # Buildx needed ONLY for --platform metadata, NOT for emulation
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 6: Login to GHCR ─────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 7: Compute tags ──────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Step 8: Build and push ARM64 image ───────────
      # Use build-push-action for reliable tag handling and push
      # No QEMU needed because binary is pre-compiled
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Step 9: Verify push ───────────────────────────
      - name: Verify push
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "=== Verifying $PRIMARY_TAG on GHCR ==="
          docker buildx imagetools inspect "$PRIMARY_TAG" || true
          
          echo ""
          echo "=== Build Summary ==="
          echo "Image: $PRIMARY_TAG"
          echo "Status: pushed successfully"
