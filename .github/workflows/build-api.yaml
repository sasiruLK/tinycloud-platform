name: Build and Push API Image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile*'
      - '.github/workflows/build-api.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Step 1: Checkout ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Go (native x86_64) ─────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: false

      - name: Verify Go version
        run: |
          echo "=== Go Version ==="
          go version
          echo ""
          echo "=== Go Env ==="
          go env GOOS GOARCH GOTOOLCHAIN

      # ── Step 3: Download dependencies ──────────────────
      - name: Download Go modules
        run: |
          echo "=== Downloading modules ==="
          go mod download
          echo "=== Module cache ==="
          go env GOMODCACHE

      # ── Step 4: Cross-compile ARM64 binary natively ────
      - name: Build ARM64 binary
        run: |
          echo "=== Building linux/arm64 binary ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-w -s" \
            -o api \
            ./cmd/api
          
          echo ""
          echo "=== Binary verification ==="
          file api
          ls -lh api
          
          echo ""
          echo "=== Binary checksum ==="
          sha256sum api

      # ── Step 5: Setup Docker Buildx ──────────────────
      # Buildx needed ONLY for --platform metadata, NOT for emulation
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 6: Login to GHCR ─────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 7: Compute tags ──────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Step 8: Build ARM64 image (no QEMU) ───────────
      - name: Build image
        run: |
          echo "=== Tags to build ==="
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "=== Labels ==="
          echo "${{ steps.meta.outputs.labels }}"
          
          # Convert tags list to -t flags
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.meta.outputs.tags }}"
          
          echo ""
          echo "=== Building with args: $TAG_ARGS ==="
          docker buildx build \
            --platform linux/arm64 \
            --file Dockerfile.release \
            $TAG_ARGS \
            --load \
            .

      # ── Step 9: Verify image locally ───────────────────
      - name: Verify image
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "=== Verifying image: $PRIMARY_TAG ==="
          docker image ls "$PRIMARY_TAG"
          echo ""
          echo "=== Architecture ==="
          docker inspect "$PRIMARY_TAG" --format='{{.Os}}/{{.Architecture}}'
          echo ""
          echo "=== Image size ==="
          docker inspect "$PRIMARY_TAG" --format='{{.Size}}' | numfmt --to=iec

      # ── Step 10: Push to GHCR ─────────────────────────
      - name: Push image
        run: |
          echo "=== Pushing all tags ==="
          
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.meta.outputs.tags }}"
          
          docker buildx build \
            --platform linux/arm64 \
            --file Dockerfile.release \
            $TAG_ARGS \
            --push \
            .

      # ── Step 11: Verify push ───────────────────────────
      - name: Verify push
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "=== Verifying $PRIMARY_TAG on GHCR ==="
          docker buildx imagetools inspect "$PRIMARY_TAG" || true
          
          echo ""
          echo "=== Build Summary ==="
          echo "Image: $PRIMARY_TAG"
          echo "Status: pushed successfully"
