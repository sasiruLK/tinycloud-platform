apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinycloud-api
  namespace: tinycloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tinycloud-api-argocd
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tinycloud-api-logs
  namespace: demo
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tinycloud-api-argocd
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: tinycloud-api
    namespace: tinycloud
roleRef:
  kind: Role
  name: tinycloud-api-argocd
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tinycloud-api-logs
  namespace: demo
subjects:
  - kind: ServiceAccount
    name: tinycloud-api
    namespace: tinycloud
roleRef:
  kind: Role
  name: tinycloud-api-logs
  apiGroup: rbac.authorization.k8s.io
