apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinycloud-api
  namespace: tinycloud
  labels:
    app: tinycloud-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinycloud-api
  template:
    metadata:
      labels:
        app: tinycloud-api
    spec:
      serviceAccountName: tinycloud-api
      imagePullSecrets:
        - name: ocir-creds
      containers:
        - name: api
          image: iad.ocir.io/idzghas4xwzv/tinycloud/tinycloud-platform-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: CORS_ORIGINS
              value: "http://tinycloud.local,https://tinycloud.local"
            - name: GITHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: username
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-pat
                  key: token
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
